spring:
  application:
    名字: adg-rule
  profiles:
    已激活: prod  #切换至 dev 即可输出调试信息

logging:
  file:
    path: ./logs

application:
  rule:
    #远程规则
    remote:
    # 1. AdsBlocking:
    ## UBlock:
      - 'https://raw.githubusercontent.com/uBlockOrigin/uAssets/refs/heads/master/filters/filters.txt'
      - 'https://raw.githubusercontent.com/uBlockOrigin/uAssets/refs/heads/master/filters/badware.txt'
      - 'https://raw.githubusercontent.com/uBlockOrigin/uAssets/refs/heads/master/filters/privacy.txt'
      - 'https://raw.githubusercontent.com/uBlockOrigin/uAssets/refs/heads/master/filters/quick-fixes.txt'
      - 'https://raw.githubusercontent.com/uBlockOrigin/uAssets/refs/heads/master/filters/unbreak.txt'

    ## EasyList:
      - 'https://easylist.to/easylist/easylist.txt' #easylist
      - 'https://raw.githubusercontent.com/easylist/easylist/master/easylist/easylist_allowlist.txt' #easylist - allowlist 
      - 'https://raw.githubusercontent.com/easylist/easylistchina/master/easylistchina.txt' #EasyList China

    ## AdGuard
      - 'https://filters.adtidy.org/extension/ublock/filters/2.txt' #AdGuard Base filter + EasyList
      - 'https://filters.adtidy.org/extension/ublock/filters/11.txt' #AdGuard Mobile Ads filter
      - 'https://filters.adtidy.org/extension/ublock/filters/224.txt' #Chinese Filter
      - 'https://raw.githubusercontent.com/AdguardTeam/AdguardFilters/master/ChineseFilter/sections/allowlist.txt' #Chinese Allowlist

    ## Peter Lowe
      - 'https://pgl.yoyo.org/adservers/serverlist.php?hostformat=hosts&showintro=1&mimetype=plaintext'

    ## Ohters
      - 'https://raw.githubusercontent.com/damengzhu/banad/refs/heads/main/jiekouAD.txt'
      - 'https://raw.githubusercontent.com/TG-SST/uBlock/master/AWAVenueAdsRule.txt'
      - 'https://filter.futa.gg/filter.txt'
      - 'https://filter.futa.gg/hosts_abp.txt'
      - 'https://filter.futa.gg/TW165_abp.txt'
      - 'https://filter.futa.gg/nofarm_abp.txt'

    # 2. TrackingServers:
    ## EasyPrivacy
      - 'https://easylist.to/easylist/easyprivacy.txt' # EasyPrivacy
      - 'https://raw.githubusercontent.com/easylist/easylist/master/easyprivacy/easyprivacy_trackingservers.txt' #EasyPrivacy #Combined in AdGuard DNS filter
      - 'https://raw.githubusercontent.com/easylist/easylist/master/easyprivacy/easyprivacy_thirdparty.txt' #EasyPrivacy third party

    ## Adguard
      - 'https://filters.adtidy.org/extension/ublock/filters/17.txt' #AdGuard URL Tracking filter
      - 'https://filters.adtidy.org/extension/ublock/filters/3.txt' #AdGuard Tracking Protection filter
      - 'https://raw.githubusercontent.com/AdguardTeam/AdguardFilters/master/SpywareFilter/sections/allowlist.txt' #AdGuard Tracking Protection filter - allowlist
      - 'https://raw.githubusercontent.com/AdguardTeam/AdguardFilters/master/SpywareFilter/sections/mobile_allowlist.txt' #AdguardFilters SpywareFilter mobile - allowlist
      - 'https://raw.githubusercontent.com/AdguardTeam/AdguardFilters/master/SpywareFilter/sections/mobile.txt' #AdguardFilters SpywareFilter mobile

    # 3. Cookie notices:
      - 'https://raw.githubusercontent.com/uBlockOrigin/uAssets/master/filters/annoyances-cookies.txt'
      - 'https://filters.adtidy.org/extension/ublock/filters/18.txt'

    # 4. Social wigets:
      - 'https://easylist-downloads.adblockplus.org/fanboy-social.txt'
      - 'https://filters.adtidy.org/extension/ublock/filters/4.txt'

    # 5. Annoyances:
      - 'https://easylist-downloads.adblockplus.org/fanboy-annoyance.txt'
      - 'https://filters.adtidy.org/extension/ublock/filters/14.txt'
      - 'https://raw.githubusercontent.com/uBlockOrigin/uAssets/master/filters/annoyances-others.txt'
      - 'https://raw.githubusercontent.com/cjx82630/cjxlist/master/cjx-annoyance.txt'

    # 6. Malwares:
      - 'https://malware-filter.gitlab.io/malware-filter/urlhaus-filter-ag.txt'
 
    # 7. Cryptominers
      - 'https://raw.githubusercontent.com/AdguardTeam/AdguardFilters/master/BaseFilter/sections/cryptominers.txt' #AdGuard Cryptominers
      - 'https://raw.githubusercontent.com/hoshsadiq/adblock-nocoin-list/master/nocoin.txt' #hoshsadiq/adblock-nocoin-list 
      
    #本地规则
    local: #本地规则请将文件移动到项目路径rule目录中
      - 'mylist.txt'
  output:
    path: rule   #规则文件输出路径，相对路径默认从 项目目录开始
    files:
      all.txt:    #输出文件名
        - DOMAIN  #域名规则，仅完整域名
        - REGEX   #正则规则，包含正则的域名规则，AdGH支持
        - MODIFY  #修饰规则，添加了一些修饰符号的规则，AdG支持
        - HOSTS   #Hosts规则
      adgh.txt:
        - DOMAIN
        - REGEX
#        - HOSTS
      hosts.txt:
        - HOSTS
      regex.txt:
        - REGEX
      domain.txt:
        - DOMAIN
      modify.txt:
        - MODIFY
